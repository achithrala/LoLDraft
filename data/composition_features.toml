# Hand-curated composition feature vectors, keyed by champion_id (matches Data
# Dragon / OP.GG's shared numeric champion key -- see CLAUDE.md).
#
# These are subjective judgment calls about each champion's kit -- NOT derived from
# any provider -- checked in and versioned like code, same as the spec asks for.
# `stats/composition.py` falls back to a crude Data-Dragon-tag heuristic for any
# champion not listed here (most of OP.GG's ~170-champion roster). Being listed here
# is strictly more accurate than that fallback, so extend this table over guessing.
#
# Fields:
#   ad_share / ap_share / true_share  -- damage type split, should sum to ~1.0
#   engage      -- has a hard initiation/pick tool
#   disengage   -- has a peel/escape/anti-engage tool
#   poke        -- strong long-range harass without committing
#   waveclear   -- clears minion waves quickly
#   frontline   -- can reasonably absorb damage/tank for the team
#   scaling     -- primary power-spike window: "early" | "mid" | "late"

