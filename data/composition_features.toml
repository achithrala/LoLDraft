# Hand-curated composition feature vectors, keyed by `ddragon_id` (Data Dragon's
# stable string champion id, e.g. "MissFortune" -- the same field `Champion.
# ddragon_id` exposes).
#
# NOT keyed by champion_id. An earlier version of this file used champion_id,
# on the mistaken assumption (stated in this file's own header at the time) that
# it was "Data Dragon / OP.GG's shared numeric champion key." It isn't:
# ManualCSVProvider's ids 1-20 are a local synthetic numbering (see CLAUDE.md),
# and real Data Dragon/OP.GG happens to assign its own ids 1-20 to a completely
# different set of champions (Annie, Olaf, Galio, ... Warwick=19, Nunu=20).
# Caught from a live user report: composition scoring under --provider opgg was
# silently pulling a hand-curated entry meant for an unrelated manual-dataset
# champion of the same numeric id -- e.g. real Warwick (opgg id 19) was scored
# using this table's old entry for manual-dataset id 19, which was Renekton, so
# Warwick escaped the frontline/engage/waveclear penalties a zero-support-games
# champion should get, letting him rank above genuine support picks. `ddragon_id`
# is a real, globally stable identifier both providers agree on (ManualCSVProvider
# reuses real Data Dragon strings for its 20 champions -- see champions.csv), so
# it can't collide across providers the way small integers can. Same fix pattern
# already used for champion pools (see CLAUDE.md's "champion pool weighting"
# section) -- store/match by a provider-independent identity, never a raw id.
#
# These are subjective judgment calls about each champion's kit -- NOT derived from
# any provider -- checked in and versioned like code, same as the spec asks for.
# `stats/composition.py` falls back to a crude Data-Dragon-tag heuristic for any
# champion not listed here (most of OP.GG's ~170-champion roster). Being listed here
# is strictly more accurate than that fallback, so extend this table over guessing.
#
# Fields:
#   ad_share / ap_share / true_share  -- damage type split, should sum to ~1.0
#   engage      -- has a hard initiation/pick tool
#   disengage   -- has a peel/escape/anti-engage tool
#   poke        -- strong long-range harass without committing
#   waveclear   -- clears minion waves quickly
#   frontline   -- can reasonably absorb damage/tank for the team
#   scaling     -- primary power-spike window: "early" | "mid" | "late"

